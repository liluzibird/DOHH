<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DOHH - Directory for Office Hours and Help</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f2f2f2;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0}
    h1{font-style:italic;color:#c39b00;margin-bottom:20px}
    #classSelection_input{padding:10px;border:2px solid #007a33;border-radius:5px;margin-right:10px}
    button{padding:10px 15px;background:#007a33;color:#fff;border:none;border-radius:5px;cursor:pointer}
    button:hover{background:#005d26}
    #result_list{list-style:none;padding:0;margin-top:20px;width:80%;max-width:600px}
    .result_item{background:#fff;border:1px solid #007a33;border-radius:5px;margin-top:5px;padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .result_main{flex:1}
    .result_meta{font-size:0.9em;color:#333;margin-top:6px}
    .vote_box{display:flex;flex-direction:column;align-items:center;gap:6px;margin-left:10px}
    .vote_btn{background:#eee;color:#333;border-radius:4px;padding:6px 8px;cursor:pointer;border:1px solid #ccc}
    .vote_btn:hover{background:#ddd}
    #suggest_btn{margin-left:10px;background:#c39b00}
    .modal_bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
    .modal{background:#fff;padding:16px;border-radius:8px;width:320px;box-shadow:0 6px 18px rgba(0,0,0,0.15)}
    .modal input{width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px}
    .more_info{font-size:0.85em;color:#666;margin-top:6px;cursor:pointer}
    .counts{font-size:0.85em;color:#444;margin-top:6px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
  <script>
    // Escape to avoid injection
    function escapeHtml(str){ return String(str||"").replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }

    // Render results array (expects server returns array sorted by score desc then createdAt asc)
    function renderResults(data){
      const $list = $("#result_list");
      $list.empty();
      if(!data || data.length===0){ $list.append("<li>Class number could not be found, try again.</li>"); return; }
      data.forEach(item=>{
        const score = (item.upvotes||0) - (item.downvotes||0);
        const id = item.id;
        const created = item.createdAt ? new Date(item.createdAt).toLocaleString() : "";
        const $li = $(`
          <li class="result_item" data-id="${escapeHtml(id)}">
            <div class="result_main">
              <div><strong>Class:</strong> ${escapeHtml(item.ClassNum)} &nbsp; <strong>Course:</strong> ${escapeHtml(item.CourseNum)}</div>
              <div class="result_meta"><strong>Prof:</strong> ${escapeHtml(item.ProfName)} &nbsp; <strong>Hours:</strong> ${escapeHtml(item.ProfHours)}</div>
              <div class="more_info">Show vote details</div>
              <div class="counts" style="display:none">Upvotes: <span class="upc">${item.upvotes||0}</span> &nbsp; Downvotes: <span class="downc">${item.downvotes||0}</span></div>
              <div class="meta_created" style="font-size:0.8em;color:#666;margin-top:6px">Submitted: ${escapeHtml(created)}</div>
            </div>
            <div class="vote_box">
              <button class="vote_btn upvote">▲</button>
              <div class="vote_count">${score}</div>
              <button class="vote_btn downvote">▼</button>
            </div>
          </li>
        `);
        $li.find(".upvote").on("click", ()=> vote(id,"up"));
        $li.find(".downvote").on("click", ()=> vote(id,"down"));
        $li.find(".more_info").on("click", function(){
          const $counts = $(this).siblings(".counts");
          if($counts.is(":visible")){ $counts.hide(); $(this).text("Show vote details"); }
          else{ $counts.show(); $(this).text("Hide vote details"); }
        });
        $list.append($li);
      });
    }

    function search(){
      const classSelection = $("#classSelection_input").val();
      if(!classSelection) return;
      $.ajax({
        url: "/search/" + encodeURIComponent(classSelection),
        type: "GET",
        dataType: "json",
        success: function(data){ renderResults(data); },
        error: function(){ $("#result_list").empty().append("<li>Search error. Try again later.</li>"); }
      });
    }

    function openSuggest(){ $("#modal_bg").show(); }
    function closeSuggest(){ $("#modal_bg").hide(); $("#suggest_form")[0].reset(); }

    // Submit suggestion: ensure server creates a new row each time. Client refreshes list after success.
    function submitSuggest(e){
      e.preventDefault();
      const payload = {
        ClassNum: String($("#s_ClassNum").val()).trim(),
        CourseNum: $("#s_CourseNum").val().trim(),
        ProfName: $("#s_ProfName").val().trim(),
        ProfHours: $("#s_ProfHours").val().trim()
      };
      if(!payload.ClassNum || !payload.CourseNum || !payload.ProfName || !payload.ProfHours){
        alert("Please fill all fields.");
        return;
      }

      const $submitBtn = $("#suggest_form button[type=submit]");
      $submitBtn.prop("disabled", true);

      $.ajax({
        url: "/suggest",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(payload),
        dataType: "json",
        success: function(created){
          closeSuggest();
          $submitBtn.prop("disabled", false);
          // If server returned the created record, simply refresh the current results so duplicates show.
          if($("#classSelection_input").val() == payload.ClassNum){
            search();
          } else {
            // optional: set input to the submitted class so user sees it immediately
            $("#classSelection_input").val(payload.ClassNum);
            search();
          }
          // lightweight success feedback
          const $msg = $("<div>")
            .text("Suggestion submitted")
            .css({position:"fixed",right:20,top:20,background:"#007a33",color:"#fff",padding:"8px 12px","border-radius":"6px","z-index":9999});
          $("body").append($msg);
          setTimeout(()=> $msg.fadeOut(200,()=>$msg.remove()), 1800);
        },
        error: function(xhr){
          $submitBtn.prop("disabled", false);
          let err = "Could not submit suggestion.";
          try{
            const json = JSON.parse(xhr.responseText || "{}");
            if(json.error) err = json.error;
            else if(json.message) err = json.message;
          }catch(e){}
          alert(err);
        }
      });

    }

    function vote(id,type){
      $.ajax({
        url: "/vote",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({ id:id, vote:type }),
        dataType: "json",
        success: function(updated){
          const $li = $(`[data-id='${id}']`);
          const score = (updated.upvotes||0) - (updated.downvotes||0);
          $li.find(".vote_count").text(score);
          $li.find(".upc").text(updated.upvotes||0);
          $li.find(".downc").text(updated.downvotes||0);
          // Refresh whole list to maintain ordering after vote
          const curClass = $("#classSelection_input").val();
          if(curClass) search();
        },
        error: function(){ alert("Vote failed."); }
      });
    }

    $(function(){
      $("#suggest_btn").on("click", openSuggest);
      $("#modal_close").on("click", closeSuggest);
      $("#suggest_form").on("submit", submitSuggest);
    });
  </script>
</head>
<body>
  <h1><em>Welcome to DOHH</em></h1>
  <div style="display:flex;align-items:center;">
    <input id="classSelection_input" type="number" placeholder="Enter class number..." />
    <button onclick="search()">Search</button>
    <button id="suggest_btn">Suggest</button>
  </div>
  <ul id="result_list"></ul>

  <div id="modal_bg" class="modal_bg">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>Suggest Office Hours</strong>
        <button id="modal_close">✕</button>
      </div>
      <form id="suggest_form">
        <input id="s_ClassNum" name="ClassNum" type="number" placeholder="ClassNum (e.g., 1234)" required />
        <input id="s_CourseNum" name="CourseNum" type="text" placeholder="CourseNum (e.g., CS4321)" required />
        <input id="s_ProfName" name="ProfName" type="text" placeholder="ProfName (e.g., John Smith)" required />
        <input id="s_ProfHours" name="ProfHours" type="text" placeholder="ProfHours (e.g., Tue 3-5pm)" required />
        <div style="display:flex;justify-content:flex-end;gap:18px;margin-top:8px;">
          <button type="button" onclick="closeSuggest()">Cancel</button>
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
